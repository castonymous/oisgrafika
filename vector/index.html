<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo to Stencil SVG Converter (Offline)</title>
<style>
:root{
  --color-background-primary:#fff;
  --color-background-secondary:#f7f7f5;
  --color-background-tertiary:#eeeeec;
  --color-background-info:#e8f0fe;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#5a5a58;
  --color-text-tertiary:#8a8a87;
  --color-text-info:#1a56db;
  --color-border-secondary:#d4d4d2;
  --color-border-tertiary:#e5e5e3;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);padding:1rem;max-width:1100px;margin:0 auto}
h1{font-size:20px;margin-bottom:.25rem;font-weight:600}
.subtitle{font-size:12px;color:var(--color-text-tertiary);margin-bottom:1rem}
.app{padding:.5rem 0}
.dropzone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:background .15s;background:var(--color-background-secondary)}
.dropzone:hover,.dropzone.drag{background:var(--color-background-tertiary)}
.dropzone p{font-size:14px;color:var(--color-text-secondary);margin-bottom:.25rem}
.dropzone span{font-size:12px;color:var(--color-text-tertiary)}
.panels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-top:1rem}
.panel{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:.75rem;border:.5px solid var(--color-border-tertiary);min-height:200px}
.panel-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap}
.panel canvas,.panel img,.panel .svg-wrap{width:100%;border-radius:6px;display:block;background:#fff}
.panel .svg-wrap{min-height:150px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.panel .svg-wrap svg{max-width:100%;max-height:500px;display:block}
.controls{margin-top:.5rem;display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
.section-title{font-size:11px;color:var(--color-text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 .5rem;grid-column:1/-1}
.ctrl{background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.6rem .75rem}
.ctrl label{font-size:12px;color:var(--color-text-secondary);display:flex;justify-content:space-between;margin-bottom:.4rem;font-weight:500}
.ctrl label span{color:var(--color-text-primary);font-weight:600}
.ctrl input[type=range]{width:100%}
.ctrl-row{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
.ctrl-row button{flex:1;min-width:120px;padding:.6rem;font-size:13px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;transition:background .1s;font-weight:500}
.ctrl-row button:hover{background:var(--color-background-secondary)}
.ctrl-row .btn-primary{background:#1a1a1a;color:#fff;border-color:transparent}
.ctrl-row .btn-primary:hover{opacity:.85}
.status{font-size:12px;color:var(--color-text-secondary);text-align:center;margin-top:.75rem;min-height:18px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.invert-row{display:flex;align-items:center;gap:.5rem;margin-top:.75rem;padding:.6rem .75rem;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)}
.invert-row label{font-size:13px;color:var(--color-text-secondary);cursor:pointer}
@media (max-width: 800px){
  .panels{grid-template-columns:1fr}
}
</style>
</head>
<body>
<h1>Photo to Stencil SVG Converter</h1>
<div class="subtitle">100% offline — gak butuh internet</div>
<div class="app">
  <div class="dropzone" id="dropzone">
    <p>Drop foto di sini, klik untuk upload, atau paste (Ctrl+V)</p>
    <span>JPG, PNG, WEBP — maks 10MB</span>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div id="workspace" style="display:none">
    <div class="panels">
      <div class="panel">
        <div class="panel-label"><span>Original</span></div>
        <canvas id="srcCanvas"></canvas>
      </div>
      <div class="panel">
        <div class="panel-label"><span>Bitmap Stencil</span><span class="badge" id="modeBadge">threshold</span></div>
        <canvas id="outCanvas"></canvas>
      </div>
      <div class="panel">
        <div class="panel-label"><span>SVG Vector</span><span class="badge" id="svgBadge">smooth</span></div>
        <div class="svg-wrap" id="svgWrap"><span style="color:var(--color-text-tertiary);font-size:12px">tracing…</span></div>
      </div>
    </div>

    <div class="section-title">Bitmap Preprocessing</div>
    <div class="controls">
      <div class="ctrl">
        <label>Threshold <span id="threshVal">128</span></label>
        <input type="range" id="thresh" min="0" max="255" value="128" step="1">
      </div>
      <div class="ctrl">
        <label>Blur / Smooth <span id="blurVal">1</span></label>
        <input type="range" id="blur" min="0" max="5" value="1" step="1">
      </div>
      <div class="ctrl">
        <label>Edge Detail <span id="edgeVal">0</span></label>
        <input type="range" id="edge" min="0" max="10" value="0" step="1">
      </div>
      <div class="ctrl">
        <label>Contrast Boost <span id="contrastVal">1.0</span></label>
        <input type="range" id="contrast" min="0.5" max="3" value="1" step="0.1">
      </div>
    </div>

    <div class="section-title">Vector Smoothing</div>
    <div class="controls">
      <div class="ctrl">
        <label>Despeckle (min area) <span id="turdVal">4</span></label>
        <input type="range" id="turd" min="0" max="200" value="4" step="1">
      </div>
      <div class="ctrl">
        <label>Smoothing Strength <span id="smoothVal">2</span></label>
        <input type="range" id="smooth" min="0" max="6" value="2" step="1">
      </div>
      <div class="ctrl">
        <label>Simplify Tolerance <span id="simpVal">1.0</span></label>
        <input type="range" id="simp" min="0" max="5" value="1" step="0.1">
      </div>
      <div class="ctrl">
        <label>Curve Style <span id="curveVal">Bezier</span></label>
        <input type="range" id="curve" min="0" max="1" value="1" step="1">
      </div>
    </div>

    <div class="invert-row">
      <input type="checkbox" id="invertChk">
      <label for="invertChk">Invert (hitam ↔ putih)</label>
    </div>

    <div class="ctrl-row">
      <button id="refreshBtn">Refresh</button>
      <button id="clearBtn">Clear Input</button>
      <button id="resetBtn">Reset Settings</button>
      <button id="dlPngBtn">Download PNG</button>
      <button class="btn-primary" id="dlSvgBtn">Download SVG</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
/* =============================================================
   INLINE VECTOR TRACER
   Self-contained bitmap-to-SVG tracer (no external libraries).
   Pipeline: binarize -> Moore boundary trace -> Douglas-Peucker
   simplify -> Chaikin smoothing -> output as polylines or bezier
   path. Produces a single black <path> on transparent background.
   ============================================================= */

const Tracer = (() => {

  // ---- Moore-Neighbor boundary tracing ----
  // bits: Uint8Array, 1 = filled (black), 0 = bg (white)
  // Returns array of contour arrays (each contour = array of {x,y})
  function traceContours(bits, w, h) {
    const visited = new Uint8Array(w * h);
    const contours = [];

    // 8-directional neighbors, clockwise starting from East
    // order: E, SE, S, SW, W, NW, N, NE
    const dx = [1, 1, 0,-1,-1,-1, 0, 1];
    const dy = [0, 1, 1, 1, 0,-1,-1,-1];

    function isFilled(x, y) {
      if (x < 0 || y < 0 || x >= w || y >= h) return false;
      return bits[y * w + x] === 1;
    }

    function traceOne(sx, sy) {
      const contour = [];
      let cx = sx, cy = sy;
      // entry direction: we came from the left (west), so start checking from N
      let dir = 6;
      const maxIter = w * h * 4;
      let iter = 0;
      while (iter++ < maxIter) {
        contour.push({x: cx, y: cy});
        visited[cy * w + cx] = 1;
        // Look around starting from (dir + 6) % 8 (turn left from current direction)
        let found = false;
        const startDir = (dir + 6) % 8;
        for (let i = 0; i < 8; i++) {
          const nd = (startDir + i) % 8;
          const nx = cx + dx[nd];
          const ny = cy + dy[nd];
          if (isFilled(nx, ny)) {
            cx = nx; cy = ny; dir = nd;
            found = true;
            break;
          }
        }
        if (!found) break; // isolated pixel
        if (cx === sx && cy === sy) break;
      }
      return contour;
    }

    // Scan top-to-bottom, left-to-right; find unvisited filled pixel
    // whose west neighbor is background -> start of a new outer contour.
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        if (bits[y * w + x] !== 1) continue;
        if (visited[y * w + x]) continue;
        // is this a boundary pixel? (has at least one bg neighbor)
        const isBoundary =
          !isFilled(x - 1, y) || !isFilled(x + 1, y) ||
          !isFilled(x, y - 1) || !isFilled(x, y + 1);
        if (!isBoundary) { visited[y * w + x] = 1; continue; }
        const contour = traceOne(x, y);
        if (contour.length >= 3) contours.push(contour);
      }
    }
    return contours;
  }

  // ---- polygon area (signed, shoelace) ----
  function polyArea(poly) {
    let s = 0;
    for (let i = 0, n = poly.length; i < n; i++) {
      const a = poly[i], b = poly[(i + 1) % n];
      s += a.x * b.y - b.x * a.y;
    }
    return Math.abs(s) / 2;
  }

  // ---- Douglas-Peucker simplification (closed polygon) ----
  // For a closed polygon, pick two extreme anchors, split into two open
  // arcs, run standard DP on each.
  function simplify(points, tolerance) {
    if (points.length < 4 || tolerance <= 0) return points;
    const n = points.length;
    const keep = new Uint8Array(n);

    // Anchor 0 and the point farthest from it
    let i0 = 0, i1 = 0, maxDist = -1;
    for (let i = 1; i < n; i++) {
      const dx = points[i].x - points[0].x;
      const dy = points[i].y - points[0].y;
      const d = dx*dx + dy*dy;
      if (d > maxDist) { maxDist = d; i1 = i; }
    }
    keep[i0] = 1; keep[i1] = 1;

    // Standard linear DP on an inclusive index range [a..b] from `arr`,
    // where arr is an array of indices into `points`.
    function dpArc(arr, a, b) {
      if (b - a < 2) return;
      const ia = arr[a], ib = arr[b];
      const ax = points[ia].x, ay = points[ia].y;
      const bx = points[ib].x, by = points[ib].y;
      const ex = bx - ax, ey = by - ay;
      const len2 = ex*ex + ey*ey;
      let maxD = -1, maxI = -1;
      for (let i = a + 1; i < b; i++) {
        const pi = arr[i];
        let d;
        if (len2 === 0) {
          const dx = points[pi].x - ax, dy = points[pi].y - ay;
          d = dx*dx + dy*dy;
        } else {
          const num = ey * points[pi].x - ex * points[pi].y + bx*ay - by*ax;
          d = (num * num) / len2;
        }
        if (d > maxD) { maxD = d; maxI = i; }
      }
      if (maxD > tolerance * tolerance) {
        keep[arr[maxI]] = 1;
        dpArc(arr, a, maxI);
        dpArc(arr, maxI, b);
      }
    }

    // Arc 1: indices i0..i1 (forward order)
    const arc1 = [];
    for (let i = i0; i <= i1; i++) arc1.push(i);
    if (arc1.length > 1) dpArc(arc1, 0, arc1.length - 1);

    // Arc 2: indices i1..n-1, 0..i0
    const arc2 = [];
    for (let i = i1; i < n; i++) arc2.push(i);
    for (let i = 0; i <= i0; i++) arc2.push(i);
    if (arc2.length > 1) dpArc(arc2, 0, arc2.length - 1);

    const result = [];
    for (let i = 0; i < n; i++) if (keep[i]) result.push(points[i]);
    return result;
  }

  // ---- Chaikin corner-cutting smoothing (closed) ----
  function chaikin(points, iterations) {
    if (iterations <= 0 || points.length < 3) return points;
    let pts = points;
    for (let it = 0; it < iterations; it++) {
      const out = [];
      const n = pts.length;
      for (let i = 0; i < n; i++) {
        const a = pts[i];
        const b = pts[(i + 1) % n];
        out.push({ x: a.x * 0.75 + b.x * 0.25, y: a.y * 0.75 + b.y * 0.25 });
        out.push({ x: a.x * 0.25 + b.x * 0.75, y: a.y * 0.25 + b.y * 0.75 });
      }
      pts = out;
    }
    return pts;
  }

  // ---- Convert polyline to SVG path (lines OR cubic bezier via Catmull-Rom) ----
  function pointsToPath(points, asBezier) {
    if (points.length < 2) return '';
    const n = points.length;
    if (!asBezier) {
      let d = `M${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;
      for (let i = 1; i < n; i++) {
        d += ` L${points[i].x.toFixed(2)} ${points[i].y.toFixed(2)}`;
      }
      d += ' Z';
      return d;
    }
    // Catmull-Rom -> cubic bezier (closed)
    let d = `M${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;
    for (let i = 0; i < n; i++) {
      const p0 = points[(i - 1 + n) % n];
      const p1 = points[i];
      const p2 = points[(i + 1) % n];
      const p3 = points[(i + 2) % n];
      const c1x = p1.x + (p2.x - p0.x) / 6;
      const c1y = p1.y + (p2.y - p0.y) / 6;
      const c2x = p2.x - (p3.x - p1.x) / 6;
      const c2y = p2.y - (p3.y - p1.y) / 6;
      d += ` C${c1x.toFixed(2)} ${c1y.toFixed(2)},${c2x.toFixed(2)} ${c2y.toFixed(2)},${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
    }
    d += ' Z';
    return d;
  }

  // ---- main API ----
  // imgData = ImageData object, threshold already applied (we read R channel)
  // opts = {minArea, smoothing, tolerance, bezier}
  function trace(imgData, opts) {
    const { width: w, height: h, data } = imgData;
    const bits = new Uint8Array(w * h);
    // bits[i] = 1 where pixel is BLACK (R < 128). Stencil = trace black shapes.
    for (let i = 0; i < w * h; i++) bits[i] = data[i * 4] < 128 ? 1 : 0;

    const contours = traceContours(bits, w, h);

    const minArea = opts.minArea || 0;
    const smoothing = opts.smoothing || 0;
    const tol = opts.tolerance || 0;
    const bezier = !!opts.bezier;

    const paths = [];
    for (const c of contours) {
      if (polyArea(c) < minArea) continue;
      let simplified = tol > 0 ? simplify(c, tol) : c;
      if (simplified.length < 3) continue;
      const smoothed = smoothing > 0 ? chaikin(simplified, smoothing) : simplified;
      paths.push(pointsToPath(smoothed, bezier));
    }

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
<path d="${paths.join(' ')}" fill="#000" fill-rule="evenodd"/>
</svg>`;
    return svg;
  }

  return { trace };
})();

/* ============================================================= */
/* UI & image processing pipeline                                 */
/* ============================================================= */

let srcImg = null;
let processing = false;
let lastSvg = '';

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const workspace = document.getElementById('workspace');
const srcCanvas = document.getElementById('srcCanvas');
const outCanvas = document.getElementById('outCanvas');
const srcCtx = srcCanvas.getContext('2d');
const outCtx = outCanvas.getContext('2d');
const status = document.getElementById('status');
const modeBadge = document.getElementById('modeBadge');
const svgWrap = document.getElementById('svgWrap');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      const maxW = 700, maxH = 700;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      w = Math.round(w); h = Math.round(h);
      srcCanvas.width = outCanvas.width = w;
      srcCanvas.height = outCanvas.height = h;
      srcCtx.drawImage(img, 0, 0, w, h);
      workspace.style.display = 'block';
      dropzone.style.display = 'none';
      processImage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

const thresh = document.getElementById('thresh');
const blur = document.getElementById('blur');
const edge = document.getElementById('edge');
const contrast = document.getElementById('contrast');
const invertChk = document.getElementById('invertChk');
const turd = document.getElementById('turd');
const smooth = document.getElementById('smooth');
const simp = document.getElementById('simp');
const curve = document.getElementById('curve');

function updateLabel(id, val) { document.getElementById(id).textContent = val; }

thresh.addEventListener('input', () => { updateLabel('threshVal', thresh.value); scheduleProcess(); });
blur.addEventListener('input', () => { updateLabel('blurVal', blur.value); scheduleProcess(); });
edge.addEventListener('input', () => { updateLabel('edgeVal', edge.value); scheduleProcess(); updateBadge(); });
contrast.addEventListener('input', () => { updateLabel('contrastVal', parseFloat(contrast.value).toFixed(1)); scheduleProcess(); });
invertChk.addEventListener('change', scheduleProcess);
turd.addEventListener('input', () => { updateLabel('turdVal', turd.value); scheduleTrace(); });
smooth.addEventListener('input', () => { updateLabel('smoothVal', smooth.value); scheduleTrace(); });
simp.addEventListener('input', () => { updateLabel('simpVal', parseFloat(simp.value).toFixed(1)); scheduleTrace(); });
curve.addEventListener('input', () => { updateLabel('curveVal', curve.value == 1 ? 'Bezier' : 'Polyline'); scheduleTrace(); });

function updateBadge() {
  const ev = parseInt(edge.value);
  modeBadge.textContent = ev > 0 ? 'edge + threshold' : 'threshold';
}

let procTimer = null, traceTimer = null;
function scheduleProcess() { clearTimeout(procTimer); procTimer = setTimeout(processImage, 30); }
function scheduleTrace() { clearTimeout(traceTimer); traceTimer = setTimeout(traceToSVG, 50); }

document.getElementById('resetBtn').addEventListener('click', () => {
  thresh.value = 128; blur.value = 1; edge.value = 0; contrast.value = 1;
  invertChk.checked = false;
  turd.value = 4; smooth.value = 2; simp.value = 1; curve.value = 1;
  updateLabel('threshVal', 128); updateLabel('blurVal', 1); updateLabel('edgeVal', 0); updateLabel('contrastVal', '1.0');
  updateLabel('turdVal', 4); updateLabel('smoothVal', 2); updateLabel('simpVal', '1.0'); updateLabel('curveVal', 'Bezier');
  updateBadge();
  processImage();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  // Reset back to the initial pre-upload state without refreshing the page
  srcImg = null;
  lastSvg = '';
  fileInput.value = '';
  // Reset all settings to defaults too, so next upload starts clean
  thresh.value = 128; blur.value = 1; edge.value = 0; contrast.value = 1;
  invertChk.checked = false;
  turd.value = 4; smooth.value = 2; simp.value = 1; curve.value = 1;
  updateLabel('threshVal', 128); updateLabel('blurVal', 1); updateLabel('edgeVal', 0); updateLabel('contrastVal', '1.0');
  updateLabel('turdVal', 4); updateLabel('smoothVal', 2); updateLabel('simpVal', '1.0'); updateLabel('curveVal', 'Bezier');
  updateBadge();
  // Clear canvases
  srcCtx.clearRect(0, 0, srcCanvas.width, srcCanvas.height);
  outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
  svgWrap.innerHTML = '<span style="color:var(--color-text-tertiary);font-size:12px">tracing…</span>';
  status.textContent = '';
  // Hide workspace, show dropzone
  workspace.style.display = 'none';
  dropzone.style.display = 'block';
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  // Clear the current image but keep workspace visible so dropzone
  // appears in-place above the panels. User can immediately paste or
  // drop a new image without scrolling or losing context.
  srcImg = null;
  lastSvg = '';
  fileInput.value = '';
  srcCtx.clearRect(0, 0, srcCanvas.width, srcCanvas.height);
  outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
  svgWrap.innerHTML = '<span style="color:var(--color-text-tertiary);font-size:12px">menunggu gambar…</span>';
  status.textContent = 'Siap untuk gambar baru — paste (Ctrl+V) atau drop di sini';
  // Show dropzone but keep workspace visible
  dropzone.style.display = 'block';
});

// Global paste-from-clipboard: works anywhere on the page
document.addEventListener('paste', (e) => {
  const items = (e.clipboardData || window.clipboardData)?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type && item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) {
        e.preventDefault();
        handleFile(file);
        return;
      }
    }
  }
});

document.getElementById('dlPngBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'stencil.png';
  a.href = outCanvas.toDataURL('image/png');
  a.click();
});

document.getElementById('dlSvgBtn').addEventListener('click', () => {
  if (!lastSvg) return;
  const blob = new Blob([lastSvg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = 'stencil.svg';
  a.href = url;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
});

function applyGaussianBlur(data, w, h, radius) {
  if (radius < 1) return data;
  const sigma = radius;
  const kSize = Math.ceil(sigma * 3) * 2 + 1;
  const kernel = [];
  let sum = 0;
  const half = Math.floor(kSize / 2);
  for (let i = 0; i < kSize; i++) {
    const x = i - half;
    const v = Math.exp(-(x * x) / (2 * sigma * sigma));
    kernel.push(v); sum += v;
  }
  for (let i = 0; i < kSize; i++) kernel[i] /= sum;

  const temp = new Float32Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let val = 0;
      for (let k = 0; k < kSize; k++) {
        const nx = Math.min(Math.max(x + k - half, 0), w - 1);
        val += data[y * w + nx] * kernel[k];
      }
      temp[y * w + x] = val;
    }
  }
  const gray = new Uint8ClampedArray(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let val = 0;
      for (let k = 0; k < kSize; k++) {
        const ny = Math.min(Math.max(y + k - half, 0), h - 1);
        val += temp[ny * w + x] * kernel[k];
      }
      gray[y * w + x] = Math.round(val);
    }
  }
  return gray;
}

function processImage() {
  if (!srcImg || processing) return;
  processing = true;
  status.textContent = 'Memproses bitmap...';

  requestAnimationFrame(() => {
    const w = srcCanvas.width, h = srcCanvas.height;
    const imgData = srcCtx.getImageData(0, 0, w, h);
    const d = imgData.data;

    const contrastV = parseFloat(contrast.value);
    const blurR = parseInt(blur.value);
    const threshV = parseInt(thresh.value);
    const edgeV = parseInt(edge.value);
    const invert = invertChk.checked;

    const grayRaw = new Uint8ClampedArray(w * h);
    for (let i = 0; i < w * h; i++) {
      const r = d[i*4], g = d[i*4+1], b = d[i*4+2];
      let lum = 0.299 * r + 0.587 * g + 0.114 * b;
      lum = Math.min(255, Math.max(0, ((lum - 128) * contrastV) + 128));
      grayRaw[i] = Math.round(lum);
    }

    const grayBlurred = blurR > 0 ? applyGaussianBlur(grayRaw, w, h, blurR) : grayRaw;

    let edgeMap = null;
    if (edgeV > 0) {
      edgeMap = new Float32Array(w * h);
      const eScale = edgeV / 5.0;
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const get = (dy, dx) => grayBlurred[(y+dy)*w+(x+dx)];
          const gx = -get(-1,-1) + get(-1,1) - 2*get(0,-1) + 2*get(0,1) - get(1,-1) + get(1,1);
          const gy = -get(-1,-1) - 2*get(-1,0) - get(-1,1) + get(1,-1) + 2*get(1,0) + get(1,1);
          edgeMap[y*w+x] = Math.min(255, Math.sqrt(gx*gx + gy*gy) * eScale);
        }
      }
    }

    const out = outCtx.createImageData(w, h);
    const od = out.data;
    for (let i = 0; i < w * h; i++) {
      let val = grayBlurred[i];
      if (edgeMap) {
        const strength = edgeV / 10.0;
        val = Math.round(val * (1 - strength) + (255 - edgeMap[i]) * strength);
      }
      let bin = val < threshV ? 0 : 255;
      if (invert) bin = 255 - bin;
      od[i*4] = od[i*4+1] = od[i*4+2] = bin;
      od[i*4+3] = 255;
    }
    outCtx.putImageData(out, 0, 0);
    processing = false;
    traceToSVG();
  });
}

function traceToSVG() {
  if (!srcImg) return;
  status.textContent = 'Tracing vector...';

  requestAnimationFrame(() => {
    try {
      const w = outCanvas.width, h = outCanvas.height;
      const imgData = outCtx.getImageData(0, 0, w, h);
      const svg = Tracer.trace(imgData, {
        minArea: parseInt(turd.value),
        smoothing: parseInt(smooth.value),
        tolerance: parseFloat(simp.value),
        bezier: curve.value == 1
      });
      lastSvg = svg;
      svgWrap.innerHTML = svg;
      status.textContent = 'Selesai ✓';
    } catch (err) {
      svgWrap.innerHTML = '<span style="color:#c00;font-size:12px">Error: ' + err.message + '</span>';
      status.textContent = 'Trace error';
      console.error(err);
    }
  });
}
